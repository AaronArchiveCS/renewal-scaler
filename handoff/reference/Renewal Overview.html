<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Renewal Overview — The Feed</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --paper: #FAF7F1;
    --paper-2: #F4F0E6;
    --ink: #1A1714;
    --ink-2: #4A4640;
    --ink-3: #8A847A;
    --rule: #D9D2C2;
    --rule-2: #E8E2D2;
    --accent: #2F5D3A;        /* deep forest — savings */
    --accent-soft: #E8EFE3;
    --highlight: #C9622E;     /* warm terracotta — for highlighted option */
    --highlight-soft: #F4E6D8;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #ECE7DA; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding: 32px 16px 96px;
  }

  /* ── Page (letter-ish, but flexible) ─────────────────────────────── */
  .page {
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
    background: var(--paper);
    box-shadow:
      0 1px 0 rgba(0,0,0,.04),
      0 30px 60px -20px rgba(40,30,10,.18),
      0 12px 24px -12px rgba(40,30,10,.12);
    position: relative;
  }
  .page + .page { margin-top: 28px; }

  .page-inner {
    padding: 56px 64px 48px;
    position: relative;
  }

  /* ── Brand bar ────────────────────────────────────────────────── */
  .brand {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 36px;
  }
  .brand-mark {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .brand-glyph {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--ink);
    position: relative;
  }
  .brand-glyph::after {
    content: ""; position: absolute; inset: 5px;
    background: var(--paper); border-radius: 50%;
  }
  .brand-glyph::before {
    content: ""; position: absolute; left: 50%; top: 50%;
    width: 2px; height: 2px; margin: -1px 0 0 -1px;
    background: var(--ink); border-radius: 50%;
    z-index: 1;
  }
  .brand-name {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    letter-spacing: -.01em;
    font-weight: 400;
  }
  .brand-meta {
    font-size: 11px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 500;
  }

  /* ── Eyebrow + title ─────────────────────────────────────────── */
  .eyebrow {
    font-size: 11px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 16px;
  }
  .doc-title {
    font-family: 'Instrument Serif', serif;
    font-weight: 400;
    font-size: 64px;
    line-height: .98;
    letter-spacing: -.02em;
    margin-bottom: 14px;
  }
  .doc-title em { font-style: italic; color: var(--ink-2); }
  .doc-sub {
    font-size: 15px;
    color: var(--ink-2);
    max-width: 560px;
    line-height: 1.55;
    text-wrap: pretty;
  }

  .meta-row {
    display: flex;
    gap: 32px;
    margin-top: 28px;
    padding-top: 18px;
    border-top: 1px solid var(--rule-2);
    flex-wrap: wrap;
  }
  .meta-item .meta-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .meta-item .meta-value {
    font-size: 14px;
    color: var(--ink);
    font-weight: 500;
  }

  /* ── Section header ──────────────────────────────────────────── */
  .section {
    margin-top: 48px;
  }
  .section-head {
    display: flex;
    align-items: baseline;
    gap: 14px;
    margin-bottom: 20px;
  }
  .section-num {
    font-family: 'Instrument Serif', serif;
    font-size: 18px;
    color: var(--ink-3);
    font-style: italic;
  }
  .section-title {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    font-weight: 400;
    letter-spacing: -.01em;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .section-rule {
    flex: 1;
    min-width: 24px;
    height: 1px;
    background: var(--rule);
    align-self: center;
    margin-left: 6px;
  }

  /* ── Current state ───────────────────────────────────────────── */
  .current {
    display: grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 36px;
    align-items: start;
  }
  .current-summary {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    line-height: 1.35;
    letter-spacing: -.005em;
    color: var(--ink);
  }
  .current-summary strong {
    font-weight: 400;
    background: linear-gradient(transparent 62%, var(--accent-soft) 62%);
    padding: 0 2px;
  }
  .current-summary em { font-style: italic; color: var(--ink-2); }

  .current-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px 24px;
    border-left: 1px solid var(--rule);
    padding-left: 32px;
  }
  .stat-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 3px;
  }
  .stat-value {
    font-size: 15px;
    color: var(--ink);
    font-weight: 500;
    font-variant-numeric: tabular-nums;
  }
  .stat-value .unit { color: var(--ink-3); font-weight: 400; font-size: 13px; }

  /* ── Recommendation strip ────────────────────────────────────── */
  .recommendation {
    margin-top: 40px;
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 26px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 32px;
  }
  .rec-text {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    line-height: 1.35;
    letter-spacing: -.005em;
  }
  .rec-text .rec-eyebrow {
    display: block;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: .18em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 6px;
  }
  .rec-text strong {
    font-weight: 400;
    background: linear-gradient(transparent 62%, var(--accent-soft) 62%);
    padding: 0 4px;
  }
  .rec-pill {
    flex-shrink: 0;
    padding: 8px 14px;
    border: 1px solid var(--ink);
    border-radius: 999px;
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-weight: 600;
    white-space: nowrap;
  }

  /* ── Options ──────────────────────────────────────────────────── */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-top: 4px;
  }

  .option {
    background: var(--paper);
    border: 1px solid var(--rule);
    padding: 28px 28px 24px;
    position: relative;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }
  .option.featured {
    border: 1.5px solid var(--ink);
    background: linear-gradient(180deg, var(--paper) 0%, var(--paper-2) 100%);
  }
  .option-tag {
    position: absolute;
    top: -10px; left: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 4px 12px;
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    font-weight: 600;
    white-space: nowrap;
    line-height: 1.3;
  }
  .option-tag.muted {
    background: var(--paper);
    color: var(--ink-3);
    border: 1px solid var(--rule);
  }

  .option-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
    padding-bottom: 14px;
    border-bottom: 1px solid var(--rule-2);
  }
  .option-name {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    letter-spacing: -.01em;
    font-weight: 400;
  }
  .option-term {
    font-size: 11px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
  }

  /* Hero numbers */
  .hero-stack {
    display: grid;
    grid-template-columns: 1fr;
    gap: 18px;
  }
  .hero-primary { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
  .hero-amount {
    font-family: 'Instrument Serif', serif;
    font-size: 68px;
    line-height: .92;
    letter-spacing: -.025em;
    font-weight: 400;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .hero-amount .currency {
    font-size: 36px;
    vertical-align: 14px;
    color: var(--ink-2);
    margin-right: 2px;
  }
  .hero-period {
    font-size: 12px;
    color: var(--ink-3);
    font-weight: 500;
    letter-spacing: .12em;
    text-transform: uppercase;
    padding-bottom: 10px;
    white-space: nowrap;
  }

  .hero-trio {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0;
    border-top: 1px solid var(--rule-2);
    padding-top: 14px;
  }
  .hero-trio-cell {
    padding: 0 12px;
    border-right: 1px solid var(--rule-2);
  }
  .hero-trio-cell:first-child { padding-left: 0; }
  .hero-trio-cell:last-child { padding-right: 0; border-right: 0; }
  .hero-trio-label {
    font-size: 9px;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 4px;
    line-height: 1.2;
    white-space: nowrap;
  }
  .hero-trio-value {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    line-height: 1.05;
    letter-spacing: -.01em;
    font-variant-numeric: tabular-nums;
  }
  .hero-trio-value.savings { color: var(--accent); }
  .hero-trio-sub {
    font-size: 11px;
    color: var(--ink-3);
    margin-top: 2px;
    font-variant-numeric: tabular-nums;
  }

  /* Line items */
  .lineitems {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .lineitem {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 12px;
    padding: 8px 0;
    border-bottom: 1px dashed var(--rule-2);
  }
  .lineitem:last-of-type { border-bottom: 0; }
  .li-label {
    font-size: 13px;
    color: var(--ink);
    font-weight: 500;
  }
  .li-sub {
    font-size: 11.5px;
    color: var(--ink-3);
    margin-top: 2px;
  }
  .li-amount {
    font-size: 14px;
    font-weight: 500;
    font-variant-numeric: tabular-nums;
    color: var(--ink);
    text-align: right;
    white-space: nowrap;
  }
  .li-amount .strike {
    text-decoration: line-through;
    color: var(--ink-3);
    font-weight: 400;
    margin-right: 6px;
  }

  /* Savings callout */
  .savings-callout {
    background: var(--accent-soft);
    border: 1px solid color-mix(in oklab, var(--accent) 30%, transparent);
    padding: 14px 16px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 12px;
  }
  .savings-callout .sc-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 700;
  }
  .savings-callout .sc-amount {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: var(--accent);
    font-weight: 400;
    font-variant-numeric: tabular-nums;
  }

  /* ── Package features block ──────────────────────────────────── */
  .pkg {
    background: var(--paper-2);
    border: 1px solid var(--rule);
    padding: 28px 32px;
  }
  .pkg-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--rule);
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .pkg-name {
    font-family: 'Instrument Serif', serif;
    font-size: 32px;
    line-height: 1;
    letter-spacing: -.01em;
    margin-bottom: 4px;
  }
  .pkg-tagline {
    font-size: 13px;
    color: var(--ink-2);
    font-style: italic;
    font-family: 'Instrument Serif', serif;
    font-size: 16px;
  }
  .pkg-allowances {
    display: flex;
    gap: 24px;
  }
  .pkg-allow-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 2px;
  }
  .pkg-allow-value {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    line-height: 1.1;
    font-variant-numeric: tabular-nums;
  }

  .pkg-cols {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 32px;
  }
  .pkg-col-label {
    font-size: 10px;
    letter-spacing: .14em;
    text-transform: uppercase;
    color: var(--ink-3);
    font-weight: 600;
    margin-bottom: 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--rule-2);
  }
  .feat-list {
    list-style: none;
    padding: 0;
    margin: 0;
    display: flex;
    flex-direction: column;
    gap: 7px;
  }
  .feat {
    display: flex;
    align-items: baseline;
    gap: 8px;
    font-size: 13px;
    line-height: 1.35;
  }
  .feat-check {
    color: var(--accent);
    flex-shrink: 0;
    transform: translateY(2px);
  }
  .feat-text {
    flex: 1;
    min-width: 0;
  }
  .feat-name {
    color: var(--ink);
    font-weight: 500;
  }
  .feat-note {
    color: var(--ink-3);
    font-size: 11.5px;
    font-style: italic;
    margin-left: 2px;
  }
  .feat-bullet::before {
    content: "·";
    color: var(--ink-3);
    margin-right: 4px;
    font-weight: 700;
  }

  /* ── Footer ───────────────────────────────────────────────────── */
  .doc-footer {
    margin-top: 48px;
    padding-top: 18px;
    border-top: 1px solid var(--rule);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 24px;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: .04em;
  }
  .doc-footer .signoff {
    font-family: 'Instrument Serif', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-2);
    letter-spacing: 0;
  }

  /* ── Density variants ────────────────────────────────────────── */
  body[data-density="compact"] .page-inner { padding: 40px 48px 36px; }
  body[data-density="compact"] .doc-title { font-size: 52px; }
  body[data-density="compact"] .section { margin-top: 36px; }
  body[data-density="compact"] .hero-amount { font-size: 56px; }
  body[data-density="compact"] .hero-trio-value { font-size: 22px; }
  body[data-density="compact"] .option { padding: 22px 22px 20px; gap: 14px; }
  body[data-density="compact"] .recommendation { padding: 20px 26px; }
  body[data-density="compact"] .rec-text { font-size: 18px; }
  body[data-density="compact"] .current-summary { font-size: 18px; }

  body[data-density="comfy"] .page-inner { padding: 72px 80px 60px; }
  body[data-density="comfy"] .doc-title { font-size: 76px; }
  body[data-density="comfy"] .section { margin-top: 60px; }
  body[data-density="comfy"] .hero-amount { font-size: 78px; }

  /* ── Print ────────────────────────────────────────────────────── */
  @page { size: letter; margin: 0; }
  @media print {
    html, body { background: var(--paper); }
    body { padding: 0; }
    .page { box-shadow: none; max-width: none; width: 100%; }
    .page-inner { padding: 48px 56px 40px; }
    .page + .page { margin-top: 0; page-break-before: always; }
    [data-noncommentable], .twk-panel { display: none !important; }
  }

  /* small screens fallback */
  @media (max-width: 720px) {
    .page-inner { padding: 36px 28px 32px; }
    .doc-title { font-size: 44px; }
    .current { grid-template-columns: 1fr; gap: 24px; }
    .current-stats { border-left: 0; padding-left: 0; border-top: 1px solid var(--rule); padding-top: 18px; }
    .options { grid-template-columns: 1fr; }
    .recommendation { flex-direction: column; align-items: flex-start; }
    .meta-row { gap: 18px; }
    .hero-amount { font-size: 56px; }
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>
  <script type="text/babel" src="renewal.jsx"></script>
</body>
</html>
